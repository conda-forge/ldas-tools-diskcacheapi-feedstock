schema_version: 1

context:
  name: ldas-tools-diskcacheAPI
  version: 2.7.8
  # dependencies
  ldas_tools_cmake_version: 1.2.3
  ldas_tools_al_version: 2.7.0
  ldas_tools_ldasgen_version: 2.7.4

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://software.ligo.org/sources/source/${{ name }}-${{ version }}.tar.gz
  sha256: ca23b3404c61c58b7ba77e18347dc42e1fa6f114a5f877ebdcaca1c86fd53e95
  patches:
    - patches/0001-diskcache-don-t-build-static-libraries.patch
    - patches/0002-diskcache-disable-OSX-launch-daemon.patch

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake >=3.6
    - make
    - pkg-config
  host:
    - ldas-tools-al ${{ ldas_tools_al_version }}.*
    - ldas-tools-cmake >=${{ ldas_tools_cmake_version }}
    - ldas-tools-ldasgen ${{ ldas_tools_ldasgen_version }}.*
    - libboost-devel
  run_exports:
    - ${{ pin_subpackage("ldas-tools-diskcacheapi", upper_bound="x.x") }}

tests:
  - requirements:
      run:
        - if: unix
          then: pkg-config
    script:
      - diskcache --help
      - pkg-config --print-errors --exact-version ${{ version }} ldastools-diskcache

about:
  summary: LDAS tools diskcacheAPI library
  description: |
    LDAS tools diskcacheAPI library. This package provides the runtime
    libraries and executables but does not provide the systemd
    infrastructure to run diskcache as a service.
  homepage: https://wiki.ligo.org/Computing/LDASTools
  repository: https://git.ligo.org/ldastools/LDAS_Tools
  license: GPL-2.0-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - duncanmmacleod
    - emaros
